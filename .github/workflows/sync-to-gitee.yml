name: Sync to Gitee

on:
  push:
    branches: [master, main, codex/ph-titrator]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key for Gitee
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 gitee.com >> ~/.ssh/known_hosts

      - name: Test SSH connection to Gitee
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=10 -T git@gitee.com || true

      - name: Configure Git and push to Gitee
        timeout-minutes: 5
        run: |
          git config --global protocol.version 0
          git config --global push.negotiate false
          git config --global core.sshCommand "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no"
          git remote add gitee git@gitee.com:rocketscn/k10-ph-titrator.git 2>/dev/null || git remote set-url gitee git@gitee.com:rocketscn/k10-ph-titrator.git
          git checkout -B codex/ph-titrator
          echo "=== Pushing to Gitee (protocol v0, no-thin) ==="
          git push --no-thin --verbose gitee codex/ph-titrator
          echo "=== Push done ==="
