[platformio]
src_dir = ph_titrator

[env:unihiker]
# All authentication adapter .cpp files under src_dir are compiled automatically.
platform = https://github.com/DFRobot/platform-unihiker.git
board = unihiker_k10
framework = arduino
board_build.partitions = ph_titrator/partitions.csv
lib_deps =
    madhephaestus/ESP32Servo@^3.2.1
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DModel=None
monitor_speed = 115200

[env:unihiker-auth-recovery]
extends = env:unihiker
build_flags =
    ${env:unihiker.build_flags}
    -DAUTH_USB_RECOVERY=1
